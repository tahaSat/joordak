# Nginx config for joordak.site
# Install: sudo cp deploy/joordak.site.nginx.conf /etc/nginx/sites-available/joordak.site
# Enable:  sudo ln -s /etc/nginx/sites-available/joordak.site /etc/nginx/sites-enabled/
# SSL:     sudo certbot --nginx -d joordak.site -d www.joordak.site
# Reload:  sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name joordak.site www.joordak.site;
    return 301 https://joordak.site$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name joordak.site www.joordak.site;

    root /var/www/joordak/public;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/joordak.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/joordak.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
