# Step 2 — production HTTPS (after certbot)
# Install: sudo cp deploy/joordak.shop.nginx.conf /etc/nginx/sites-available/joordak.shop
# Test:    sudo nginx -t && sudo systemctl reload nginx
#
# Adjust if needed:
#   root     → your deploy path (default /var/www/joordak/public)
#   fastcgi  → php8.2-fpm.sock or php8.3-fpm.sock (match: ls /run/php/)

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name joordak.shop www.joordak.shop;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/joordak/public;
        allow all;
    }

    location / {
        return 301 https://joordak.shop$request_uri;
    }
}

# www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.joordak.shop;

    ssl_certificate     /etc/letsencrypt/live/joordak.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/joordak.shop/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://joordak.shop$request_uri;
}

# Main site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name joordak.shop;

    root /var/www/joordak/public;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/joordak.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/joordak.shop/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    charset utf-8;
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
