# Step 1 — use this BEFORE SSL exists (certbot bootstrap)
# Install: sudo cp deploy/joordak.shop.nginx.http-only.conf /etc/nginx/sites-available/joordak.shop
# Enable:  sudo ln -sf /etc/nginx/sites-available/joordak.shop /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx
# Then run certbot (see deploy/setup-ssl.sh)

server {
    listen 80;
    listen [::]:80;
    server_name joordak.shop www.joordak.shop;

    root /var/www/joordak/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    # Let's Encrypt HTTP-01 challenge
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/joordak/public;
        allow all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
